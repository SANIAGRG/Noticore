spring:
  datasource:
    # Supabase gives you a connection string on your project's dashboard under
    # Project Settings -> Database -> Connection string (choose "JDBC").
    # We read it from environment variables instead of hardcoding it here --
    # never commit real database credentials into a file.
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # "update" auto-creates/alters tables from your @Entity classes on
      # startup -- fine for learning, but a real production project uses
      # Flyway migrations instead so schema changes are tracked in version
      # control. We'll switch to that later if you want.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080